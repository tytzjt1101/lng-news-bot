name: LNG News Alert

on:
  schedule:
    # UTC 기준 21:00 = 한국시간 오전 6시
    - cron: "0 21 * * *"

    # UTC 기준 04:00 = 한국시간 오후 1시
    - cron: "0 4 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests deep-translator

      - name: Run LNG news bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python news_to_telegram.py

      - name: Commit seen state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add seen.json

          git commit -m "Update seen state" || echo "No changes to commit"

          git pull --rebase

          git push
