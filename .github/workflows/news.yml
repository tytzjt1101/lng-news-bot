name: LNG News Alert

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install feedparser requests

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python news_to_telegram.py

      - name: Commit seen state
        run: |
          test -f seen.json || echo "[]" > seen.json
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "update seen articles"
          git push
