name: LNG News Alert (EN)

permissions:
  contents: write

on:
  schedule:
    - cron: "10,40 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install feedparser requests

      - name: Run bot (EN)
        env:
          BOT_TOKEN_EN: ${{ secrets.BOT_TOKEN_EN }}
          CHAT_ID_EN: ${{ secrets.CHAT_ID_EN }}
        run: python news_to_telegram_en.py

      - name: Commit seen state (EN)
        run: |
          test -f seen_en.json || echo "[]" > seen_en.json
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_en.json
          git diff --cached --quiet && exit 0
          git commit -m "update seen articles (EN)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 5
          done
